<html lang="ru">
<head>

<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb;color:#172033}button,input,textarea{font-family:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}.container{width:min(1180px,calc(100% - 32px));margin:auto}.header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #e5eaf3}.head{min-height:74px;display:flex;align-items:center;gap:16px}.brand{display:flex;align-items:center;gap:12px;min-width:235px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#ffb020,#fff1c7);display:grid;place-items:center;font-weight:900;color:#101b3d}.brand b{font-size:18px}.brand small{display:block;color:#667085;font-size:12px}.nav{display:flex;gap:6px;flex:1}.nav button{border:0;background:transparent;padding:11px 13px;border-radius:14px;font-weight:700}.nav button.active,.nav button:hover{background:#eef4ff;color:#2457d6}.userbox{display:flex;gap:10px;align-items:center}.btn{border:0;border-radius:14px;padding:13px 17px;font-weight:800}.blue{background:#2457d6;color:white}.yellow{background:#ffb020;color:#101b3d}.light{background:#eef4ff;color:#2457d6}.darkbtn{background:#101b3d;color:white}.red{background:#fee4e2;color:#d92d20}.hero{padding:68px 0;background:radial-gradient(circle at 90% 12%,rgba(255,176,32,.35),transparent 30%),linear-gradient(135deg,#101b3d,#2457d6);color:white}.hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:34px;align-items:center}.tag{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.15);margin-bottom:18px;font-weight:800}.hero h1{font-size:clamp(34px,5vw,60px);line-height:1.02;margin:0 0 18px}.hero p{font-size:19px;line-height:1.6;color:#e8efff}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.hero-card{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:30px;padding:28px}.symbol{font-size:70px;color:#ffb020;font-weight:900}.section{padding:54px 0}.white{background:white}.soft{background:#f5f7fb}.dark{background:#101b3d;color:white}.title{margin-bottom:24px}.title h2{font-size:clamp(28px,4vw,42px);margin:0}.title p{color:#667085;line-height:1.55;max-width:850px}.dark .title p,.dark .card p,.dark li{color:#cbd5e1}.grid{display:grid;gap:20px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.card,.task,.metric{background:white;border:1px solid #e5eaf3;border-radius:22px;padding:24px;box-shadow:0 12px 28px rgba(16,27,61,.07)}.dark .card{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}.card p{color:#667085;line-height:1.55}.step{display:flex;gap:14px}.num{width:42px;height:42px;border-radius:14px;background:#ffb020;color:#101b3d;display:grid;place-items:center;font-weight:900;flex:0 0 42px}.layout{display:grid;grid-template-columns:310px 1fr;gap:22px}.topics{display:grid;gap:10px}.topics button{background:white;border:1px solid #e5eaf3;border-radius:16px;padding:15px;text-align:left}.topics button.active{background:#eef4ff;border-color:#9bb7ff}.topics b{display:block}.topics small{color:#667085}.badge{display:inline-block;background:#eef4ff;color:#2457d6;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:800;margin-bottom:12px}.formula{display:inline-block;background:#101b3d;color:white;border-radius:14px;padding:10px 14px;font-weight:900;margin:8px 0 14px}.note{background:#eef4ff;color:#183a88;border:1px solid #c7d7fe;border-radius:16px;padding:15px}.field{display:grid;gap:7px;margin-bottom:14px}.field label{font-weight:800;font-size:14px}.input,.textarea{width:100%;border:1px solid #e5eaf3;border-radius:14px;padding:13px 14px;font-size:15px}.textarea{min-height:90px}.result{display:none;margin-top:13px;padding:14px;border-radius:15px;font-weight:700}.result.show{display:block}.good{background:#dcfae6;color:#067647}.bad{background:#fee4e2;color:#b42318}.option{display:flex;gap:10px;align-items:center;background:#fbfcff;border:1px solid #e5eaf3;border-radius:15px;padding:13px;margin:10px 0}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse}.table th,.table td{background:white;border-bottom:1px solid #e5eaf3;padding:13px;text-align:left}.table th{background:#f8faff}.progress{height:13px;background:#edf2f7;border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,#2457d6,#ffb020)}.empty{padding:22px;border:1px dashed #b7c2d6;border-radius:18px;color:#667085;background:#fbfcff}.modal{position:fixed;inset:0;background:rgba(16,27,61,.65);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal.show{display:flex}.modal-box{width:min(560px,100%);background:white;border-radius:26px;padding:26px;position:relative}.close{position:absolute;right:14px;top:14px;border:0;border-radius:12px;width:38px;height:38px;font-size:24px}.footer{background:#101b3d;color:#cbd5e1;text-align:center;padding:26px 0}@media(max-width:950px){.head{flex-wrap:wrap;padding:12px 0}.nav{width:100%;overflow:auto}.userbox{width:100%;flex-wrap:wrap}.hero-grid,.g2,.g3,.g4,.layout{grid-template-columns:1fr}}@media(max-width:560px){.actions,.userbox{flex-direction:column;align-items:stretch}.btn{width:100%}.card,.task{padding:18px}}
</style>
</head>
<body>
<header class="header"><div class="container head"><a class="brand" href="#" id="brand"><span class="logo">МП</span><b>Математика-просто<small>образовательный веб-сайт</small></b></a><nav id="nav" class="nav"></nav><div id="userbox" class="userbox"></div></div></header>
<main id="app"></main>
<footer class="footer"><div class="container">Дипломный проект: образовательный веб-сайт для преподавания математики с интерактивными заданиями и тестами.</div></footer>
<div class="modal" id="modal"><div class="modal-box"><button id="close" class="close">×</button><div id="modalContent"></div></div></div>
<script>
const TOPICS=[
{id:"linear",title:"Линейные уравнения",level:"Базовый уровень",description:"Решение уравнений первой степени с одной переменной.",theory:"Линейное уравнение имеет вид ax + b = c. Чтобы решить его, нужно перенести известные значения в одну сторону, а неизвестное оставить в другой.",formula:"ax + b = c",example:"2x + 3 = 11 → 2x = 8 → x = 4",practice:[["Решите: 2x + 3 = 11","4","2x = 8, x = 4."],["Решите: 5x - 10 = 15","5","5x = 25, x = 5."],["Решите: 7x = 42","6","x = 42 / 7 = 6."]],test:[["Какой вид имеет линейное уравнение?",["ax + b = c","ax² + bx + c = 0","S = a²","P = 4a"],0],["Чему равно x в уравнении 3x = 12?",["3","4","6","12"],1],["Что сначала сделать в 2x + 5 = 15?",["Перенести 5 вправо","Умножить на 5","Заменить x на 0","Разделить 15 на 5"],0]]},
{id:"quadratic",title:"Квадратные уравнения",level:"Средний уровень",description:"Дискриминант и нахождение корней квадратного уравнения.",theory:"Квадратное уравнение имеет вид ax² + bx + c = 0. Для решения часто используют дискриминант D = b² - 4ac.",formula:"D = b² - 4ac",example:"x² - 5x + 6 = 0 → D = 1 → x₁ = 2, x₂ = 3",practice:[["Найдите D: x² - 4x + 3 = 0","4","D = 16 - 12 = 4."],["Сколько корней при D = 0?","1","При D = 0 один корень."],["Корни x² - 3x + 2 = 0 через запятую","1,2","(x - 1)(x - 2) = 0."]],test:[["Вид квадратного уравнения?",["ax + b = c","ax² + bx + c = 0","y = kx + b","a / b = c"],1],["Что показывает дискриминант?",["Количество корней","Периметр","Процент","Площадь"],0],["Сколько корней при D < 0?",["Два","Один","Нет","Бесконечно"],2]]},
{id:"fractions",title:"Обыкновенные дроби",level:"Базовый уровень",description:"Сложение и вычитание дробей.",theory:"Дробь показывает часть от целого. Верхнее число — числитель, нижнее — знаменатель. При одинаковых знаменателях складываются числители.",formula:"a / b + c / b = (a + c) / b",example:"2 / 7 + 3 / 7 = 5 / 7",practice:[["3/8 + 2/8","5/8","Складываем числители."],["7/10 - 2/10","5/10","Вычитаем числители."],["1/6 + 4/6","5/6","1 + 4 = 5."]],test:[["Верхнее число дроби?",["Знаменатель","Числитель","Множитель","Делитель"],1],["При сложении дробей с одинаковым знаменателем знаменатель...",["Складывается","Умножается","Остается прежним","Исчезает"],2],["1/5 + 2/5 =",["3/5","3/10","2/25","1/10"],0]]},
{id:"percent",title:"Проценты",level:"Средний уровень",description:"Нахождение процента от числа.",theory:"Процент — это одна сотая часть числа. Чтобы найти процент от числа, нужно число умножить на процент и разделить на 100.",formula:"P = A × r / 100",example:"20% от 150 = 30",practice:[["20% от 150","30","150 × 20 / 100 = 30."],["12% от 500","60","500 × 12 / 100 = 60."],["5% от 1000","50","1000 × 5 / 100 = 50."]],test:[["1 процент — это...",["Одна десятая","Одна сотая","Одна тысячная","Половина"],1],["25% от 200 =",["25","40","50","100"],2],["Как найти r% от A?",["A + r","A × r / 100","A / r","100 / A"],1]]},
{id:"functions",title:"Функции и графики",level:"Средний уровень",description:"Зависимость y от x.",theory:"Функция показывает зависимость одной величины от другой. В линейной функции y = kx + b значение y зависит от выбранного x.",formula:"y = kx + b",example:"y = 2x + 1, x = 3 → y = 7",practice:[["y = 3x - 2, x = 4. Найдите y","10","3 × 4 - 2 = 10."],["y = 2x + 5, x = 3. Найдите y","11","2 × 3 + 5 = 11."],["y = x - 7, x = 12. Найдите y","5","12 - 7 = 5."]],test:[["Что показывает функция?",["Случайное число","Зависимость величин","Площадь","Дробь"],1],["Формула линейной функции:",["y = kx + b","S = ab","P = 4a","x² + y² = r²"],0],["y = x + 2, x = 5. y =",["5","6","7","10"],2]]}
];
const U="mp_users_one",S="mp_session_one",R="mp_results_one",P="mp_practice_one",C="mp_custom_one",N="mp_notes_one";
const demoUsers=[{id:"u1",name:"Иван Петров",email:"student@demo.ru",password:"123456",role:"student"},{id:"u2",name:"Анна Смирнова",email:"anna@demo.ru",password:"123456",role:"student"},{id:"u3",name:"Дмитрий Орлов",email:"dmitry@demo.ru",password:"123456",role:"student"},{id:"t1",name:"Мария Сергеевна",email:"teacher@demo.ru",password:"123456",role:"teacher"}];
const app=document.getElementById("app"),nav=document.getElementById("nav"),userbox=document.getElementById("userbox"),modal=document.getElementById("modal"),modalContent=document.getElementById("modalContent");let currentTopicId=TOPICS[0].id;
function getData(k,d){return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}function setData(k,v){localStorage.setItem(k,JSON.stringify(v))}function users(){return getData(U,[])}function results(){return getData(R,[])}function practiceResults(){return getData(P,[])}function topics(){return[...TOPICS,...getData(C,[])]}function escapeHtml(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]))}function currentUser(){const s=getData(S,null);return s?users().find(u=>u.id===s.id):null}
function init(){if(!localStorage.getItem(U))setData(U,demoUsers);if(!localStorage.getItem(R))setData(R,[{userId:"u1",topicTitle:"Линейные уравнения",score:2,total:3,percent:67,date:"12.06.2026, 15:20"},{userId:"u2",topicTitle:"Проценты",score:2,total:3,percent:67,date:"13.06.2026, 17:42"}]);if(!localStorage.getItem(P))setData(P,[{userId:"u1",topicTitle:"Линейные уравнения",task:"Решите: 2x + 3 = 11",answer:"4",correct:true,date:"12.06.2026, 15:11"}]);document.getElementById("close").onclick=closeModal;modal.onclick=e=>{if(e.target===modal)closeModal()};document.getElementById("brand").onclick=e=>{e.preventDefault();route("home")};drawNav();drawUser();home()}
function drawNav(active="home"){const u=currentUser();let items;if(!u)items=[["home","Главная"],["about","О сайте"],["login","Вход"],["reg","Регистрация"]];else if(u.role==="teacher")items=[["home","Главная"],["theory","Теория"],["practice","Практика"],["tests","Тесты"],["students","Результаты учеников"],["materials","Материалы"],["profile","Профиль"]];else items=[["home","Главная"],["theory","Теория"],["practice","Практика"],["tests","Тесты"],["my","Мои результаты"],["profile","Профиль"]];nav.innerHTML=items.map(i=>`<button class="${i[0]===active?"active":""}" data-page="${i[0]}">${i[1]}</button>`).join("");nav.querySelectorAll("button").forEach(b=>b.onclick=()=>{const p=b.dataset.page;if(p==="login")return login();if(p==="reg")return register();route(p)})}
function drawUser(){const u=currentUser();if(u){userbox.innerHTML=`<span class="badge">${u.role==="teacher"?"Преподаватель":"Ученик"}: ${escapeHtml(u.name)}</span><button class="btn red" id="logout">Выйти</button>`;document.getElementById("logout").onclick=()=>{localStorage.removeItem(S);drawNav();drawUser();home()}}else{userbox.innerHTML=`<button class="btn light" id="loginTop">Войти</button><button class="btn blue" id="registerTop">Регистрация</button>`;document.getElementById("loginTop").onclick=login;document.getElementById("registerTop").onclick=register}}
function route(page){drawNav(page);if(page==="home")home();if(page==="about")about();if(page==="theory")theory();if(page==="practice")practicePage();if(page==="tests")testsPage();if(page==="my")myResults();if(page==="students")students();if(page==="materials")materials();if(page==="profile")profile();window.scrollTo(0,0)}
function home(){const u=currentUser();app.innerHTML=`<section class="hero"><div class="container hero-grid"><div><span class="tag">Образовательная платформа по математике</span><h1>Математика без хаоса: теория, практика и тесты в одном месте</h1><p>«Математика-просто» помогает изучать темы, выполнять практические задания, проходить тестирование и отслеживать результаты обучения.</p><div class="actions">${u?`<button class="btn yellow" data-go="theory">Начать обучение</button><button class="btn light" data-go="practice">Практика</button><button class="btn darkbtn" data-go="${u.role==="teacher"?"students":"my"}">Результаты</button>`:`<button class="btn yellow" id="homeLogin">Войти</button><button class="btn light" id="homeRegister">Зарегистрироваться</button>`}</div></div><div class="hero-card"><div class="symbol">∑</div><h2>Учебный цикл</h2><p>Теория → практика → тест → результат.</p></div></div></section>${homeBlocks()}`;app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>route(b.dataset.go));const l=document.getElementById("homeLogin"),r=document.getElementById("homeRegister");if(l)l.onclick=login;if(r)r.onclick=register}
function homeBlocks(){return `<section class="section white"><div class="container"><div class="title"><h2>Что это за сайт</h2><p>Образовательный веб-ресурс для преподавания математики с интерактивными заданиями, тестами и автоматической проверкой результатов.</p></div><div class="grid g3"><div class="card"><h3>Теория</h3><p>Формулы, правила и примеры решения.</p></div><div class="card"><h3>Практика</h3><p>Поле решения, ответ и проверка под каждым заданием.</p></div><div class="card"><h3>Тесты</h3><p>Тематические тесты и сохранение результата.</p></div></div></div></section><section class="section soft"><div class="container"><div class="title"><h2>Для кого предназначен ресурс</h2><p>Сайт подходит обучающимся и преподавателю.</p></div><div class="grid g2"><div class="card"><h3>Ученик</h3><ul><li>изучает темы;</li><li>решает задания;</li><li>проходит тесты;</li><li>видит личные результаты.</li></ul></div><div class="card"><h3>Преподаватель</h3><ul><li>видит список учеников;</li><li>смотрит средний результат;</li><li>проверяет историю попыток;</li><li>управляет материалами.</li></ul></div></div></div></section><section class="section dark"><div class="container"><div class="title"><h2>Как проходит обучение</h2><p>Полный учебный цикл по каждой теме.</p></div><div class="grid g4">${["Изучение материала","Закрепление практикой","Контроль знаний","Анализ результата"].map((x,i)=>`<div class="card step"><span class="num">${i+1}</span><div><h3>${x}</h3><p>${i===0?"Теория, формула и пример.":i===1?"Задания по выбранной теме.":i===2?"Тест по теме.":"Статистика ученика и преподавателя."}</p></div></div>`).join("")}</div></div></section><section class="section white"><div class="container"><div class="title"><h2>Наполнение сайта</h2><p>Каждая тема содержит теорию, практику и тест.</p></div><div class="grid g3">${topics().map(t=>`<div class="card"><span class="badge">${escapeHtml(t.level)}</span><h3>${escapeHtml(t.title)}</h3><p>${escapeHtml(t.description)}</p></div>`).join("")}</div></div></section>`}
function about(){app.innerHTML=`<section class="section white"><div class="container"><div class="title"><h2>О сайте «Математика-просто»</h2><p>Сайт объединяет учебные материалы, интерактивные задания, тематические тесты и учет результатов.</p></div><div class="grid g2"><div class="card"><h3>Назначение</h3><ul><li>изучение тем;</li><li>закрепление знаний;</li><li>контроль результатов;</li><li>самостоятельная подготовка.</li></ul></div><div class="card"><h3>Роли пользователей</h3><ul><li>ученик проходит обучение;</li><li>преподаватель видит результаты;</li><li>меню зависит от роли пользователя.</li></ul></div></div></div></section>`}
function requireAuth(){if(!currentUser()){home();login();return false}return true}function requireTeacher(){const u=currentUser();if(!u){home();login();return false}if(u.role!=="teacher"){alert("Раздел доступен только преподавателю.");home();return false}return true}
function getTopic(){return topics().find(t=>t.id===currentTopicId)||topics()[0]}function topicMenu(){return `<div class="topics">${topics().map(t=>`<button class="${t.id===currentTopicId?"active":""}" data-topic="${t.id}"><b>${escapeHtml(t.title)}</b><small>${escapeHtml(t.level)}</small></button>`).join("")}</div>`}function bindTopicButtons(fn){app.querySelectorAll("[data-topic]").forEach(b=>b.onclick=()=>{currentTopicId=b.dataset.topic;fn()})}
function theory(){if(!requireAuth())return;const t=getTopic();app.innerHTML=`<section class="section white"><div class="container"><div class="title"><h2>Теория</h2><p>Выберите тему и изучите материал.</p></div><div class="layout">${topicMenu()}<div class="card"><span class="badge">${escapeHtml(t.level)}</span><h3>${escapeHtml(t.title)}</h3><p>${escapeHtml(t.theory)}</p><div class="formula">${escapeHtml(t.formula)}</div><div class="note"><b>Пример:</b><br>${escapeHtml(t.example)}</div><div class="actions"><button class="btn blue" data-go="practice">Практика</button><button class="btn light" data-go="tests">Тест</button></div></div></div></div></section>`;bindTopicButtons(theory);app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>route(b.dataset.go))}
function practicePage(){if(!requireAuth())return;const t=getTopic();app.innerHTML=`<section class="section soft"><div class="container"><div class="title"><h2>Практика</h2><p>Под каждым заданием есть свое поле решения и ответа.</p></div><div class="layout">${topicMenu()}<div><div class="card"><span class="badge">${escapeHtml(t.level)}</span><h3>${escapeHtml(t.title)}</h3><p>${escapeHtml(t.description)}</p><div class="formula">${escapeHtml(t.formula)}</div></div>${t.practice.map((task,i)=>`<div class="task"><span class="badge">Задание ${i+1}</span><h4>${escapeHtml(task[0])}</h4><div class="field"><label>Решение</label><textarea class="textarea" id="solution-${i}" placeholder="Запишите ход решения"></textarea></div><div class="field"><label>Ответ</label><input class="input" id="answer-${i}" placeholder="Введите ответ"></div><button class="btn blue" data-index="${i}">Проверить</button><div class="result" id="result-${i}"></div></div>`).join("")}</div></div></div></section>`;bindTopicButtons(practicePage);app.querySelectorAll("[data-index]").forEach(b=>b.onclick=()=>checkTask(Number(b.dataset.index)))}
function normalize(v){return String(v||"").trim().toLowerCase().replaceAll(" ","").replaceAll(";",",").replace(",",".")}function checkTask(i){const u=currentUser(),t=getTopic(),task=t.practice[i],answer=document.getElementById(`answer-${i}`).value,result=document.getElementById(`result-${i}`),ok=normalize(answer)===normalize(task[1]);result.className="result show "+(ok?"good":"bad");result.innerHTML=ok?`Верно. ${escapeHtml(task[2])}`:`Ошибка. Правильный ответ: <b>${escapeHtml(task[1])}</b>. ${escapeHtml(task[2])}`;const list=practiceResults();list.push({userId:u.id,topicTitle:t.title,task:task[0],answer,correct:ok,date:new Date().toLocaleString("ru-RU")});setData(P,list)}
function testsPage(){if(!requireAuth())return;const t=getTopic();app.innerHTML=`<section class="section white"><div class="container"><div class="title"><h2>Тесты</h2><p>Тесты идут по выбранной теме.</p></div><div class="layout">${topicMenu()}<div class="card"><span class="badge">Тест по теме</span><h3>${escapeHtml(t.title)}</h3><form id="testForm">${t.test.map((q,qi)=>`<div class="task"><h4>${qi+1}. ${escapeHtml(q[0])}</h4>${q[1].map((o,oi)=>`<label class="option"><input name="question-${qi}" value="${oi}" type="radio">${escapeHtml(o)}</label>`).join("")}</div>`).join("")}<button class="btn blue">Завершить тест</button><div id="testResult" class="result"></div></form></div></div></div></section>`;bindTopicButtons(testsPage);document.getElementById("testForm").onsubmit=finishTest}
function finishTest(e){e.preventDefault();const u=currentUser(),t=getTopic();let score=0,answered=0;t.test.forEach((q,i)=>{const s=document.querySelector(`input[name="question-${i}"]:checked`);if(s){answered++;if(Number(s.value)===q[2])score++}});const total=t.test.length,percent=Math.round(score/total*100),block=document.getElementById("testResult");block.className="result show "+(percent>=70?"good":"bad");block.innerHTML=`Результат: <b>${score} из ${total}</b> (${percent}%). Отвечено: ${answered} из ${total}.`;const list=results();list.push({userId:u.id,topicTitle:t.title,score,total,percent,date:new Date().toLocaleString("ru-RU")});setData(R,list)}
function average(items){return items.length?Math.round(items.reduce((s,x)=>s+x.percent,0)/items.length):0}
function myResults(){if(!requireAuth())return;const u=currentUser(),ts=results().filter(x=>x.userId===u.id),ps=practiceResults().filter(x=>x.userId===u.id),avg=average(ts);app.innerHTML=`<section class="section soft"><div class="container"><div class="title"><h2>Мои результаты</h2><p>Личная статистика ученика.</p></div><div class="grid g4"><div class="metric"><b>${ts.length}</b><span>тестов</span></div><div class="metric"><b>${avg}%</b><span>средний результат</span></div><div class="metric"><b>${ts.length?Math.max(...ts.map(i=>i.percent)):0}%</b><span>лучший результат</span></div><div class="metric"><b>${ps.filter(i=>i.correct).length}/${ps.length}</b><span>практика</span></div></div><div class="card" style="margin-top:22px"><h3>Прогресс</h3><div class="progress"><span style="width:${avg}%"></span></div></div><div class="card" style="margin-top:22px"><h3>История тестов</h3>${resultsTable(ts)}</div><div class="card" style="margin-top:22px"><h3>История практики</h3>${practiceTable(ps)}</div></div></section>`}
function students(){if(!requireTeacher())return;const st=users().filter(u=>u.role==="student"),ts=results(),ps=practiceResults();app.innerHTML=`<section class="section white"><div class="container"><div class="title"><h2>Результаты учеников</h2><p>Кабинет преподавателя со сводной таблицей и историей попыток.</p></div><div class="grid g4"><div class="metric"><b>${st.length}</b><span>учеников</span></div><div class="metric"><b>${ts.length}</b><span>тестов</span></div><div class="metric"><b>${ps.length}</b><span>ответов практики</span></div><div class="metric"><b>${average(ts)}%</b><span>средний результат</span></div></div><div class="card" style="margin-top:22px"><h3>Сводная таблица</h3><div class="table-wrap"><table class="table"><thead><tr><th>Ученик</th><th>Email</th><th>Тестов</th><th>Практика</th><th>Средний результат</th></tr></thead><tbody>${st.map(s=>{const a=ts.filter(i=>i.userId===s.id),p=ps.filter(i=>i.userId===s.id);return `<tr><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.email)}</td><td>${a.length}</td><td>${p.filter(i=>i.correct).length}/${p.length}</td><td><b>${average(a)}%</b></td></tr>`}).join("")}</tbody></table></div></div><div class="card" style="margin-top:22px"><h3>Все тесты</h3>${resultsTable(ts)}</div></div></section>`}
function resultsTable(items){if(!items.length)return `<div class="empty">Пока нет результатов.</div>`;return `<div class="table-wrap"><table class="table"><tr><th>Дата</th><th>Тема</th><th>Результат</th><th>%</th></tr>${items.slice().reverse().map(i=>`<tr><td>${escapeHtml(i.date)}</td><td>${escapeHtml(i.topicTitle)}</td><td>${i.score}/${i.total}</td><td><b>${i.percent}%</b></td></tr>`).join("")}</table></div>`}
function practiceTable(items){if(!items.length)return `<div class="empty">Пока нет заданий.</div>`;return `<div class="table-wrap"><table class="table"><tr><th>Дата</th><th>Тема</th><th>Задание</th><th>Ответ</th><th>Статус</th></tr>${items.slice().reverse().map(i=>`<tr><td>${escapeHtml(i.date)}</td><td>${escapeHtml(i.topicTitle)}</td><td>${escapeHtml(i.task)}</td><td>${escapeHtml(i.answer)}</td><td>${i.correct?"Верно":"Ошибка"}</td></tr>`).join("")}</table></div>`}
function materials(){if(!requireTeacher())return;app.innerHTML=`<section class="section soft"><div class="container"><div class="title"><h2>Материалы</h2><p>Раздел преподавателя для управления учебными материалами.</p></div><div class="grid g2"><div class="card"><h3>Темы сайта</h3><ul>${topics().map(t=>`<li><b>${escapeHtml(t.title)}</b> — ${escapeHtml(t.description)}</li>`).join("")}</ul></div><div class="card"><h3>Добавить тему</h3><form id="topicForm"><div class="field"><label>Название</label><input class="input" id="newTitle" required></div><div class="field"><label>Описание</label><textarea class="textarea" id="newDescription" required></textarea></div><button class="btn blue">Добавить</button><div id="addMessage" class="result"></div></form></div></div></div></section>`;document.getElementById("topicForm").onsubmit=e=>{e.preventDefault();document.getElementById("addMessage").className="result show good";document.getElementById("addMessage").textContent="Тема добавлена в демонстрационном режиме."}}
function profile(){if(!requireAuth())return;const u=currentUser();app.innerHTML=`<section class="section white"><div class="container"><div class="title"><h2>Профиль</h2></div><div class="card"><h3>${escapeHtml(u.name)}</h3><p><b>Email:</b> ${escapeHtml(u.email)}</p><p><b>Роль:</b> ${u.role==="teacher"?"Преподаватель":"Ученик"}</p></div></div></section>`}
function login(){modalContent.innerHTML=`<h2>Вход в систему</h2><form id="loginForm"><div class="field"><label>Email</label><input class="input" id="loginEmail" type="email" required></div><div class="field"><label>Пароль</label><input class="input" id="loginPassword" type="password" required></div><button class="btn blue">Войти</button><div id="loginMessage" class="result"></div></form>`;openModal();document.getElementById("loginForm").onsubmit=e=>{e.preventDefault();const email=document.getElementById("loginEmail").value.trim(),password=document.getElementById("loginPassword").value.trim(),user=users().find(i=>i.email===email&&i.password===password);if(!user){const m=document.getElementById("loginMessage");m.className="result show bad";m.textContent="Пользователь не найден или пароль неверный.";return}setData(S,{id:user.id});closeModal();drawNav();drawUser();home()}}
function register(){modalContent.innerHTML=`<h2>Регистрация ученика</h2><form id="registerForm"><div class="field"><label>ФИО</label><input class="input" id="registerName" required></div><div class="field"><label>Email</label><input class="input" id="registerEmail" type="email" required></div><div class="field"><label>Пароль</label><input class="input" id="registerPassword" type="password" required></div><button class="btn blue">Создать аккаунт</button><div id="registerMessage" class="result"></div></form>`;openModal();document.getElementById("registerForm").onsubmit=e=>{e.preventDefault();const all=users(),email=document.getElementById("registerEmail").value.trim();if(all.some(u=>u.email===email)){const m=document.getElementById("registerMessage");m.className="result show bad";m.textContent="Такой email уже есть.";return}const nu={id:"u-"+Date.now(),name:document.getElementById("registerName").value.trim(),email,password:document.getElementById("registerPassword").value.trim(),role:"student"};all.push(nu);setData(U,all);setData(S,{id:nu.id});closeModal();drawNav();drawUser();home()}}
function openModal(){modal.classList.add("show")}function closeModal(){modal.classList.remove("show")}init();
</script>
</body>
</html>
